<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interviewer - Professional Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState } = React;
        const { Upload, FileText, MessageSquare, CheckCircle, Loader2, User, Briefcase, Send, ChevronRight, AlertCircle } = lucide;

        function AIInterviewer() {
          const [activeStep, setActiveStep] = useState(0);
          const [resume, setResume] = useState(null);
          const [jobDescription, setJobDescription] = useState('');
          const [candidateInfo, setCandidateInfo] = useState({
            name: '',
            email: '',
            position: ''
          });
          const [atsResults, setAtsResults] = useState(null);
          const [questions, setQuestions] = useState([]);
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [answers, setAnswers] = useState({});
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');
          
          const BACKEND_URL = 'http://127.0.0.1:8000';

          const steps = [
            { id: 0, name: 'Candidate Info', icon: User },
            { id: 1, name: 'Upload Resume', icon: Upload },
            { id: 2, name: 'Job Description', icon: Briefcase },
            { id: 3, name: 'ATS Analysis', icon: CheckCircle },
            { id: 4, name: 'Interview', icon: MessageSquare }
          ];

          const handleResumeUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
              if (!validTypes.includes(file.type)) {
                setError('Please upload a PDF or DOC file');
                return;
              }
              if (file.size > 5 * 1024 * 1024) {
                setError('File size should be less than 5MB');
                return;
              }
              setResume(file);
              setError('');
            }
          };

          const runATSAnalysis = async () => {
            setLoading(true);
            setError('');
            
            try {
              const formData = new FormData();
              formData.append('file', resume);
              formData.append('job_description', jobDescription);

              const response = await fetch(`${BACKEND_URL}/ats/analyze`, {
                method: 'POST',
                body: formData
              });

              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }

              const data = await response.json();
              setAtsResults(data);
              setActiveStep(3);
            } catch (error) {
              console.error('ATS Analysis error:', error);
              setError('Failed to analyze resume. Please ensure your backend server is running on port 8000.');
            } finally {
              setLoading(false);
            }
          };

          const generateQuestions = async () => {
            setLoading(true);
            setError('');
            
            try {
              const response = await fetch(`${BACKEND_URL}/qgen/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  prompt: `Generate interview questions for ${candidateInfo.position} position based on: ${jobDescription}`,
                  max_tokens: 150,
                  num_questions: 5
                })
              });

              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }

              const data = await response.json();
              
              if (data.questions && Array.isArray(data.questions)) {
                setQuestions(data.questions);
              } else if (data.generated_text) {
                const questionList = data.generated_text
                  .split('\n')
                  .filter(q => q.trim() && q.includes('?'))
                  .slice(0, 5);
                setQuestions(questionList);
              } else {
                throw new Error('Unexpected response format');
              }
              
              setActiveStep(4);
              setCurrentQuestion(0);
            } catch (error) {
              console.error('Question generation error:', error);
              setError('Failed to generate questions. Please check your backend connection.');
            } finally {
              setLoading(false);
            }
          };

          const handleAnswerSubmit = () => {
            if (currentQuestion < questions.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
            } else {
              submitInterview();
            }
          };

          const submitInterview = async () => {
            setLoading(true);
            setError('');
            
            try {
              const interviewData = {
                candidate: candidateInfo,
                position: candidateInfo.position,
                ats_score: atsResults?.score || 0,
                questions_answers: questions.map((q, idx) => ({
                  question: q,
                  answer: answers[idx] || ''
                })),
                timestamp: new Date().toISOString()
              };

              const response = await fetch(`${BACKEND_URL}/interview/submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(interviewData)
              });

              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }

              const result = await response.json();
              alert('Interview submitted successfully! Check your email for results.');
              
              setActiveStep(0);
              setResume(null);
              setJobDescription('');
              setCandidateInfo({ name: '', email: '', position: '' });
              setAtsResults(null);
              setQuestions([]);
              setAnswers({});
              setCurrentQuestion(0);
            } catch (error) {
              console.error('Submit error:', error);
              setError('Failed to submit interview. Your responses have been saved locally.');
              localStorage.setItem('interview_backup', JSON.stringify({
                candidate: candidateInfo,
                questions,
                answers,
                timestamp: new Date().toISOString()
              }));
            } finally {
              setLoading(false);
            }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50">
              <header className="bg-white shadow-sm border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center space-x-3">
                      <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-2 rounded-lg">
                        <MessageSquare className="text-white" size={24} />
                      </div>
                      <div>
                        <h1 className="text-2xl font-bold text-gray-900">AI Interviewer</h1>
                        <p className="text-sm text-gray-500">Intelligent Recruitment Platform</p>
                      </div>
                    </div>
                    <div className="flex items-center space-x-2 text-sm">
                      <div className={`w-2 h-2 rounded-full ${loading ? 'bg-yellow-500 animate-pulse' : 'bg-green-500'}`}></div>
                      <span className="text-gray-600">Backend: {BACKEND_URL}</span>
                    </div>
                  </div>
                </div>
              </header>

              {error && (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4">
                  <div className="bg-red-50 border border-red-200 rounded-lg p-4 flex items-start space-x-3">
                    <AlertCircle className="text-red-600 flex-shrink-0 mt-0.5" size={20} />
                    <div className="flex-1">
                      <h3 className="text-sm font-medium text-red-800">Error</h3>
                      <p className="text-sm text-red-700 mt-1">{error}</p>
                    </div>
                    <button onClick={() => setError('')} className="text-red-600 hover:text-red-800">×</button>
                  </div>
                </div>
              )}

              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div className="bg-white rounded-xl shadow-sm p-6 mb-8">
                  <div className="flex items-center justify-between">
                    {steps.map((step, idx) => {
                      const Icon = step.icon;
                      const isActive = activeStep === step.id;
                      const isCompleted = activeStep > step.id;
                      
                      return (
                        <React.Fragment key={step.id}>
                          <div className="flex flex-col items-center">
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${
                              isActive ? 'bg-blue-600 text-white scale-110' :
                              isCompleted ? 'bg-green-500 text-white' :
                              'bg-gray-200 text-gray-400'
                            }`}>
                              <Icon size={20} />
                            </div>
                            <span className={`mt-2 text-xs font-medium ${
                              isActive ? 'text-blue-600' : isCompleted ? 'text-green-600' : 'text-gray-400'
                            }`}>
                              {step.name}
                            </span>
                          </div>
                          {idx < steps.length - 1 && (
                            <div className={`flex-1 h-1 mx-4 rounded ${
                              isCompleted ? 'bg-green-500' : 'bg-gray-200'
                            }`} />
                          )}
                        </React.Fragment>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm p-8">
                  {activeStep === 0 && (
                    <div className="max-w-2xl mx-auto">
                      <div className="text-center mb-8">
                        <User className="w-16 h-16 text-blue-600 mx-auto mb-4" />
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">Candidate Information</h2>
                        <p className="text-gray-600">Let's start with your basic details</p>
                      </div>

                      <div className="space-y-6">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                          <input
                            type="text"
                            value={candidateInfo.name}
                            onChange={(e) => setCandidateInfo({...candidateInfo, name: e.target.value})}
                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="John Doe"
                          />
                        </div>

                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                          <input
                            type="email"
                            value={candidateInfo.email}
                            onChange={(e) => setCandidateInfo({...candidateInfo, email: e.target.value})}
                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="john.doe@example.com"
                          />
                        </div>

                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">Position Applied For *</label>
                          <input
                            type="text"
                            value={candidateInfo.position}
                            onChange={(e) => setCandidateInfo({...candidateInfo, position: e.target.value})}
                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="e.g., Senior Software Engineer"
                          />
                        </div>

                        <button
                          onClick={() => setActiveStep(1)}
                          disabled={!candidateInfo.name || !candidateInfo.email || !candidateInfo.position}
                          className="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center space-x-2 transition-colors"
                        >
                          <span>Continue</span>
                          <ChevronRight size={20} />
                        </button>
                      </div>
                    </div>
                  )}

                  {activeStep === 1 && (
                    <div className="max-w-2xl mx-auto">
                      <div className="text-center mb-8">
                        <Upload className="w-16 h-16 text-blue-600 mx-auto mb-4" />
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">Upload Your Resume</h2>
                        <p className="text-gray-600">PDF, DOC, or DOCX format (Max 5MB)</p>
                      </div>

                      <div className={`border-2 border-dashed rounded-lg p-12 text-center transition-colors ${
                        resume ? 'border-green-500 bg-green-50' : 'border-gray-300 hover:border-blue-500'
                      }`}>
                        <input
                          type="file"
                          onChange={handleResumeUpload}
                          accept=".pdf,.doc,.docx"
                          className="hidden"
                          id="resume-upload"
                        />
                        <label htmlFor="resume-upload" className="cursor-pointer">
                          <FileText className={`w-16 h-16 mx-auto mb-4 ${resume ? 'text-green-600' : 'text-gray-400'}`} />
                          <p className="text-lg font-medium text-gray-700 mb-2">
                            {resume ? `✓ ${resume.name}` : 'Click to upload or drag and drop'}
                          </p>
                          <p className="text-sm text-gray-500">
                            {resume ? `${(resume.size / 1024).toFixed(2)} KB` : 'PDF, DOC, DOCX up to 5MB'}
                          </p>
                        </label>
                      </div>

                      <div className="flex space-x-4 mt-8">
                        <button
                          onClick={() => setActiveStep(0)}
                          className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-medium hover:bg-gray-300 transition-colors"
                        >
                          Back
                        </button>
                        <button
                          onClick={() => setActiveStep(2)}
                          disabled={!resume}
                          className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center space-x-2 transition-colors"
                        >
                          <span>Continue</span>
                          <ChevronRight size={20} />
                        </button>
                      </div>
                    </div>
                  )}

                  {activeStep === 2 && (
                    <div className="max-w-2xl mx-auto">
                      <div className="text-center mb-8">
                        <Briefcase className="w-16 h-16 text-blue-600 mx-auto mb-4" />
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">Job Description</h2>
                        <p className="text-gray-600">Provide the job requirements and responsibilities</p>
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">
                          Job Description *
                          <span className="text-gray-500 font-normal ml-2">
                            ({jobDescription.length} characters)
                          </span>
                        </label>
                        <textarea
                          value={jobDescription}
                          onChange={(e) => setJobDescription(e.target.value)}
                          rows={12}
                          className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                          placeholder="Enter the complete job description including:
• Required skills and technologies
• Years of experience needed
• Educational qualifications
• Key responsibilities
• Any specific requirements"
                        />
                      </div>

                      <div className="flex space-x-4 mt-8">
                        <button
                          onClick={() => setActiveStep(1)}
                          className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-medium hover:bg-gray-300 transition-colors"
                        >
                          Back
                        </button>
                        <button
                          onClick={runATSAnalysis}
                          disabled={!jobDescription || loading}
                          className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center space-x-2 transition-colors"
                        >
                          {loading ? (
                            <>
                              <Loader2 className="animate-spin" size={20} />
                              <span>Analyzing Resume...</span>
                            </>
                          ) : (
                            <>
                              <span>Analyze with ATS</span>
                              <ChevronRight size={20} />
                            </>
                          )}
                        </button>
                      </div>
                    </div>
                  )}

                  {activeStep === 3 && atsResults && (
                    <div className="max-w-4xl mx-auto">
                      <div className="text-center mb-8">
                        <CheckCircle className="w-16 h-16 text-green-600 mx-auto mb-4" />
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">ATS Analysis Complete</h2>
                        <p className="text-gray-600">Your resume has been analyzed</p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-lg">
                          <p className="text-sm text-blue-600 font-medium mb-2">Match Score</p>
                          <p className="text-4xl font-bold text-blue-900">
                            {atsResults.score || '85'}%
                          </p>
                        </div>
                        <div className="bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-lg">
                          <p className="text-sm text-green-600 font-medium mb-2">Skills Match</p>
                          <p className="text-4xl font-bold text-green-900">Good</p>
                        </div>
                        <div className="bg-gradient-to-br from-purple-50 to-purple-100 p-6 rounded-lg">
                          <p className="text-sm text-purple-600 font-medium mb-2">Experience</p>
                          <p className="text-4xl font-bold text-purple-900">Match</p>
                        </div>
                      </div>

                      <button
                        onClick={generateQuestions}
                        disabled={loading}
                        className="w-full bg-blue-600 text-white py-4 rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-300 flex items-center justify-center space-x-2"
                      >
                        {loading ? (
                          <>
                            <Loader2 className="animate-spin" size={20} />
                            <span>Generating Questions...</span>
                          </>
                        ) : (
                          <>
                            <MessageSquare size={20} />
                            <span>Start AI Interview</span>
                          </>
                        )}
                      </button>
                    </div>
                  )}

                  {activeStep === 4 && questions.length > 0 && (
                    <div className="max-w-4xl mx-auto">
                      <div className="text-center mb-8">
                        <MessageSquare className="w-16 h-16 text-blue-600 mx-auto mb-4" />
                        <h2 className="text-3xl font-bold text-gray-900 mb-2">AI Interview</h2>
                        <p className="text-gray-600">Question {currentQuestion + 1} of {questions.length}</p>
                      </div>

                      <div className="mb-8">
                        <div className="bg-gray-200 rounded-full h-2">
                          <div 
                            className="bg-blue-600 h-2 rounded-full transition-all"
                            style={{ width: `${((currentQuestion + 1) / questions.length) * 100}%` }}
                          ></div>
                        </div>
                      </div>

                      <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-xl p-8 mb-8 border border-blue-200">
                        <div className="flex items-start space-x-4">
                          <div className="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg flex-shrink-0">
                            {currentQuestion + 1}
                          </div>
                          <div className="flex-1">
                            <h3 className="text-xl font-semibold text-gray-900 mb-4">
                              {questions[currentQuestion]}
                            </h3>
                            <textarea
                              value={answers[currentQuestion] || ''}
                              onChange={(e) => setAnswers({...answers, [currentQuestion]: e.target.value})}
                              rows={6}
                              className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white"
                              placeholder="Type your answer here..."
                            />
                          </div>
                        </div>
                      </div>

                      <div className="flex space-x-4">
                        {currentQuestion > 0 && (
                          <button
                            onClick={() => setCurrentQuestion(currentQuestion - 1)}
                            className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300"
                          >
                            Previous
                          </button>
                        )}
                        
                        <button
                          onClick={handleAnswerSubmit}
                          disabled={!answers[currentQuestion] || loading}
                          className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-300 flex items-center justify-center space-x-2"
                        >
                          {loading ? (
                            <>
                              <Loader2 className="animate-spin" size={20} />
                              <span>Submitting...</span>
                            </>
                          ) : currentQuestion < questions.length - 1 ? (
                            <>
                              <span>Next Question</span>
                              <ChevronRight size={20} />
                            </>
                          ) : (
                            <>
                              <Send size={20} />
                              <span>Submit Interview</span>
                            </>
                          )}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AIInterviewer />);
    </script>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
